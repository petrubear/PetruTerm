name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and publish release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build .app bundle
        run: ./scripts/bundle.sh

      - name: Zip bundle
        run: |
          cd dist
          zip -r "PetruTerm-${{ github.ref_name }}-macos-arm64.zip" PetruTerm.app

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Pull out the section starting at the first ## header.
          awk '/^## /{found=1} found{print} /^## / && found>1{exit}' CHANGELOG.md \
            | head -n -1 > release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "PetruTerm ${{ github.ref_name }}" \
            --notes-file release_notes.md \
            "dist/PetruTerm-${{ github.ref_name }}-macos-arm64.zip"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
